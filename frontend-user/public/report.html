<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReportFraud.ftc.gov - Report</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="report-page-body">

    <div class="gov-banner report-gov-banner">
        <div class="container">
            <div class="gov-banner-inner">
                <div class="gov-banner-left">
                    <span class="gov-icon">🇺🇸</span>
                    <span class="gov-text">An official website of the United States government</span>
                </div>
                <div class="gov-banner-right">
                    <a href="#" class="gov-link">Here's how you know</a>
                </div>
            </div>
        </div>
    </div>

    <header class="report-header-shell">
        <div class="container report-header-inner">
            <a href="/" class="report-brand" aria-label="Go to homepage">
                <img src="css/ftc-logo.svg" alt="Federal Trade Commission" class="report-brand-logo" />
                <div class="report-brand-text">
                    <span class="report-brand-agency">FEDERAL TRADE COMMISSION</span>
                    <span class="report-brand-site">ReportFraud.ftc.gov</span>
                </div>
            </a>
        </div>
    </header>

    <main class="report-flow-page">
        <div class="container report-flow-container">
            <section class="report-progress-card">
                <div class="report-progress-row">
                    <span class="report-progress-label">Start</span>
                    <div class="report-progress-track" aria-hidden="true">
                        <span class="report-progress-fill"></span>
                    </div>
                    <span class="report-progress-label">Submit</span>
                </div>
            </section>

            <section class="report-question-block">
                <h1>Is your report about any of these common problems?</h1>
                <p>Choose the best fit. If you don't see your problem, choose “Something else.”</p>
            </section>

            <form class="report-options-form" id="reportOptionsForm">
                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="impersonator" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">An impersonator</span>
                        <span class="report-option-subtitle">(ex. fake government, business, love interest, grandchild)</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="shopping" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Online shopping</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="job-investment" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Job, investment, money-making opportunity, franchise</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="sweepstakes" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Sweepstakes, prize, lottery</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="phone-service" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Phone, internet, TV service</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="auto" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Auto sale, repair</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="health" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Health</span>
                        <span class="report-option-subtitle">(ex. weight loss, eye care, treatment)</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="credit" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Credit, debt, loan</span>
                        <span class="report-option-subtitle">(ex. debt collection, credit report, student loan debt relief)</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="annoying-call" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Just an annoying call</span>
                    </span>
                </label>

                <label class="report-option-card">
                    <input type="radio" name="report-topic" value="something-else" />
                    <span class="report-option-radio"></span>
                    <span class="report-option-copy">
                        <span class="report-option-title">Something else</span>
                        <span class="report-option-subtitle">(we'll get it to the right place)</span>
                    </span>
                </label>
            </form>

            <div class="report-bottom-space"></div>
        </div>
    </main>

    <div class="report-scroll-banner" id="reportScrollBanner">
        <div class="container">
            <span>Scroll to continue....</span>
        </div>
    </div>

    <div class="report-sticky-actions">
        <div class="container report-sticky-actions-inner">
            <button class="report-continue-btn" id="reportContinueBtn" type="button" disabled>
                Continue
                <span class="report-continue-arrow">→</span>
            </button>
        </div>
    </div>

    <script src="js/report.js"></script>
</body>
</html>
