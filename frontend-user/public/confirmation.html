<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Submitted - ReportFraud Preview</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="gov-banner">
    <div class="container">
      <div class="gov-banner-inner">
        <div class="gov-banner-left">
          <span class="gov-icon">🇺🇸</span>
          <span class="gov-text">Public reporting confirmation preview</span>
        </div>
      </div>
    </div>
  </div>

  <section class="confirmation-section">
    <div class="container">
      <div class="confirmation-container">
        <div class="confirmation-icon">✓</div>
        <h1>Your report has been submitted</h1>
        <p>Thank you for taking the time to share information.</p>

        <div class="confirmation-details">
          <div class="detail-item">
            <span class="detail-label">Report number</span>
            <span class="detail-value" id="reportNumber">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Category</span>
            <span class="detail-value" id="reportTopic">—</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Status</span>
            <span class="detail-value status-pending">Received</span>
          </div>
        </div>

        <div class="confirmation-actions">
          <a href="/report.html" class="btn btn-primary">File another report</a>
          <a href="/" class="btn btn-secondary">Return home</a>
        </div>
      </div>
    </div>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const report = params.get('report') || 'Unavailable';
    const topic = params.get('topic') || 'Not specified';

    const topicMap = {
      'impersonator': 'An impersonator',
      'shopping': 'Online shopping',
      'job-investment': 'Job or investment opportunity',
      'sweepstakes': 'Prize, lottery, or sweepstakes',
      'phone-service': 'Phone, internet, or TV service',
      'auto': 'Auto sale or repair',
      'health': 'Health-related issue',
      'credit': 'Credit, debt, or loan',
      'annoying-call': 'Just an unwanted call',
      'something-else': 'Something else'
    };

    document.getElementById('reportNumber').textContent = report;
    document.getElementById('reportTopic').textContent = topicMap[topic] || topic;
  </script>
</body>
</html>
